battle.ass_fullness.looks_pregnant=Perut mereka terlihat hamil, penuh dengan air mani\! Itu menetes dari lubang yang sering digunakan\! Gerakan mereka lambat\! -2 Kelincahan.
battle.ass_fullness.gut_stuffed=Usus mereka penuh dengan sperma\! Itu menetes keluar\! Mereka terlalu mual untuk bergerak cepat\! -1 Kelincahan.
battle.ass_fullness.cum_runs_out_of_full_ass=Sperma keluar dari pantat penuh mereka\!
battle.ass_fullness.they_drool_cum_from_their_hole=Mereka meneteskan sperma dari lubang mereka\!
battle.ass_fullness.last_of_the_cum_runs_out_of_their_hole=Yang terakhir dari sperma keluar dari lubang mereka\!
