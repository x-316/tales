character.brothel_madam.description=Pemilik dan penyedia rumah bordil di Silajam, sebuah institusi dengan pengaruh yang mengejutkan. Dia memiliki sikap yang tegas dan temperamen yang sangat pendek, tetapi dia tampaknya benar-benar peduli dengan mereka yang berada di bawah perlindungannya, dan merupakan sosok yang cerdik, meskipun terkadang perhitungan. Juga, dia memiliki bokong yang luar biasa.
character.catgirl_shopkeep.description=Seorang gadis kucing yang menjual barang dagangannya di pasar tersembunyi desa gadis kucing. Ceria dan sedikit licik, dan suka menggoda pelanggannya.
character.catgirl_salon_girl.description=Seorang gadis kucing yang bekerja di spa/salon gabungan di desa gadis kucing tersembunyi. Sangat ramah. Suka bermain dengan pelanggan.
character.catgirl_innkeep.description=Seorang gadis kucing yang bekerja di penginapan/rumah bordil gabungan di desa gadis kucing tersembunyi sebagai penjaga penginapan/madame. Bersahaja dan ramah. Juga bekerja dengan pelanggan "secara langsung".
character.catgirl_fluffy.description=Seorang gadis kucing yang bekerja di penginapan/rumah bordil gabungan di desa gadis kucing tersembunyi sebagai salah satu gadis pekerja. Pemalu dan sensual, dan memiliki ketertarikan pada oral... meskipun dia juga suka bercinta dengan panas dan berat.
character.catgirl_chattenoire.description=Seorang gadis kucing yang bekerja di penginapan/rumah bordil gabungan di desa gadis kucing tersembunyi sebagai salah satu gadis pekerja. Dia memiliki reputasi dan sikap yang menjaga jarak, mungkin kasar, tetapi "pelanggan"nya tidak bisa lebih bahagia.
character.cultist.description=Seorang pengikut kultus yang menyembah dewi kegelapan tertentu. Kemungkinan biseksual.
character.gadgeteer.description=Seorang pedagang aneh yang berspesialisasi dalam penjualan berbagai "alat" eksentrik. Memiliki beberapa hobi yang menarik.
character.hiro.description=Protagonis kita. Sedikit yang diketahui tentang pahlawan yang ditakdirkan ini selain bahwa dia terlihat imut dalam gaun.
character.hiro_2.description=Ke mana mereka akan pergi? Siapa yang akan mereka cium? Tidak ada yang tahu. Mereka imut sih.
character.kylira.description=Seorang elf yang tidak berpengalaman dan pemalu, yang bepergian dengan teman kura-kuranya dan menjual jamur. Terpesona oleh budaya manusia.
character.mimic.description=Seorang wanita misterius (?) yang berpura-pura menjadi peti berisi sesuatu yang berharga. Pada kenyataannya, harta yang sebenarnya adalah menunggu di dalam dicking tentakel berlendir\!
character.mouth_fiend.description=Seorang wanita bangsawan misterius dengan selera yang sangat khusus. Mungkin meninggalkan rasa yang buruk di mulut Anda.
character.pink_haired_prostitute.description=Seorang pelacur yang agresif yang bekerja di rumah bordil.
character.shopkeep.description=Gadis manis yang bekerja di toko kelontong di Silajam. Mungkin memiliki rahasia.
character.innkeep.description=Seorang penjaga penginapan di Silajam. Menerima bentuk pembayaran alternatif dari orang-orang manis. Jika Anda mendengar suara gedebuk di bawah meja mereka, seseorang mungkin sedang mendapatkan "malam gratis" di penginapan.
character.vampire_hunter.description=Seorang pemburu iblis yang kuat yang juga merawat roh-roh di Silajam di gerejanya. Tidak dapat menemukan penutup kemaluan yang pas untuk penis besarnya.
character.elf_lady.description=Seorang wanita elf misterius yang hanya ditemukan di dekat kolam penyembuhan, yang dia lindungi.
character.evoker.description=Seorang penyihir yang penasaran yang bersenda gurau dengan iblis.
character.adventurer.description=Seorang spellsword muda yang, meskipun tubuhnya kecil, mengayunkan kapak perang besar. Dikenal karena rasa superioritasnya yang angkuh... dan kebiasaan tidurnya yang aneh.
character.beastmistress.description=Orang-orang Drow adalah budaya yang rahasia, jadi sedikit yang diketahui tentang mereka sebagai kelompok, tetapi outlier yang berkelana ke dunia permukaan adalah sekelompok orang yang beragam dari bajingan yang kejam.\n\nPara pemburu, atau beastmistress, dikenal karena jangkauan mereka yang luas, mengendarai kucing besar yang kuat untuk mencari... mangsa.
character.brigand.description=Manusia adalah penduduk permukaan yang tersebar luas dengan ide-ide aneh tentang apa yang masuk ke mana. Mereka sedikit disukai oleh kebanyakan ras cerdas lainnya, dan beberapa yang tidak cerdas juga. Di sisi cerah, mereka membuat keju yang sangat baik.\n\nBrigand mengembara di jalan dalam mengejar kesenangan sederhana dalam hidup - rampasan, kebanyakan.
character.bunny.description=Puca terkenal karena kecerdikan mereka dan nasib baik dan buruk yang mereka bawa.\n\nSejauh yang menjadi penagih utang, dia tampak cukup menyenangkan - tetapi celakalah bagi mereka yang terlambat dengan koin mereka.
character.centaur.description=Centaur terkenal karena keterampilan memanah mereka, dominasi mereka di padang rumput - untuk beberapa klan, kekejaman mereka, dan untuk yang lain, kesabaran mereka. Masyarakat centaur memiliki kode etik yang sangat ketat, dan penis centaur sebesar... yah, ungkapan itu adalah "bergantung seperti kuda", bukan?\n\nKeterampilan memanahnya mengesankan, dan itu bukan satu-satunya hal. Hobi\: membuat kuda betina mengedip, membuat twinks kuda betina.
character.unicorn.description=Centaur terkenal karena keterampilan memanah mereka, dominasi mereka di padang rumput - untuk beberapa klan, kekejaman mereka, dan untuk yang lain, kesabaran mereka. Masyarakat centaur memiliki kode etik yang sangat ketat, dan penis centaur sebesar... yah, ungkapan itu adalah "bergantung seperti kuda", bukan?\n\nJenis centaur langka adalah unicorn, yang sangat tertarik pada perawan. Namun, perawan harus berhati-hati, karena meskipun tertarik, perilaku mereka menunjukkan bahwa mereka sedikit tertarik untuk mempertahankan keperawanan tersebut.
character.dryad.description=Seorang wanita dari kayu. Secara harfiah. Menggoda para pengunjung hutan dengan kecantikannya - tetapi dapat pula terpesona.\n\nBersedia berbagi buahnya dengan mereka yang menyerahkan diri dengan bebas.
character.ghost.description=Roh orang mati bisa saja tetap tinggal.\n\nSeorang bangsawan kuno dari kerajaan yang telah lama mati - diturunkan oleh kesedihan bahwa pernikahan karena kepentingan adalah tanpa cinta. Meskipun suaminya dengan enggan mencoba, dia tidak dapat menahan percintaan dengannya, dan meninggalkannya patah hati, dengan cara yang sama seperti dia meninggalkan pantatnya patah.
character.gloryhole.description=Setiap lubang adalah kesempatan untuk kejayaan.
character.goblin.description=Goblin adalah makhluk kecil yang goblin, bukan? Nakal, energik dan sering kejam, goblin memiliki nafsu makan yang rakus untuk makanan dan... kesenangan. Cobalah untuk menjaga mereka dalam pandangan Anda.\n\nGoblin betina mampu melakukan semacam pseudo-kehamilan, dan karena itu lebih baik dibiarkan sendiri.
character.goblin_male.description=Goblin adalah makhluk kecil yang goblin, bukan? Nakal, energik dan sering kejam, goblin memiliki nafsu makan yang rakus untuk makanan dan... kesenangan. Cobalah untuk menjaga mereka dalam pandangan Anda.\n\nGoblin jantan sering takut pada goblin betina, dan akan membiarkan mereka memilih mainan pertama.
character.golem.description=Batu yang dihidupkan adalah tanda pasti bahwa seorang penyihir sangat kuat, dan juga kemungkinan besar tua dan bosan.\n\nJika mereka terlihat seperti ini, tambahkan "kesepian" ke daftar itu. Apakah konduktor sihir benar-benar membutuhkan bokong yang luar biasa?
character.harpy.description=Harpies adalah beastmen yang agak bodoh, meskipun ada rumor bahwa mereka lebih cerdas dari pemahaman sederhana mereka tentang Bahasa Umum yang akan membiarkan mereka. Mereka adalah predator udara, memangsa burung permainan yang lebih kecil dan hewan terikat daratan.\n\nJika Anda pernah secara tidak sengaja tersandung dan duduk di bulu ayam - selamat, Anda tahu seperti apa kebiasaan kamar tidur harpy ini.
character.elite_harpy.description=Harpies adalah beastmen yang agak bodoh, meskipun ada rumor bahwa mereka lebih cerdas dari pemahaman sederhana mereka tentang Bahasa Umum yang akan membiarkan mereka. Mereka adalah predator udara, memangsa burung permainan yang lebih kecil dan hewan terikat daratan.\n\nHarpies dengan insting yang lebih terasah cenderung memimpin kawanan, dan sama-sama rakus sebagai pemburu seperti mereka adalah pasangan yang rakus.
character.ogre.description=Ogre adalah goblinoid yang besar dan kuat secara brutal - meskipun beberapa berpendapat bahwa mereka lebih dekat hubungannya dengan manusia. Kerajaan ogrish dulu umum, tetapi sekarang lebih umum untuk melihat ogre tunggal tidur di gua dan tanah terbuka, menjalani kehidupan sederhana tidur dan pembantaian.\n\nBeberapa ogre memiliki kecenderungan seksual terhadap humanoid yang lebih kecil - humanoid ini sebaiknya menghindari ogre sama sekali kecuali mereka ingin mengetahui apa yang dilakukan plunger berukuran ogre pada anus berukuran kecil.
character.orc.description=Orc terkenal kuat untuk goblinoid atau humanoid, bagaimana pun Anda memilih untuk mengklasifikasikannya. Orc di wilayah itu menghormati keberanian dan menghindari sifat pengecut.\n\nSecara kontra-intuitif, Urka lebih menyukai pelamar yang lembut daripada yang kuat, meskipun dia tidak akan menendang anak laki-laki yang berani, kuat, tetapi lembut keluar dari tempat tidur karena makan biskuit.
character.slime.description=Slime, yah, terbuat dari lendir yang hidup. Inti yang terlihat di dalamnya harus tetap utuh agar mereka mempertahankan kesadaran mereka, namun.\n\nTea adalah makhluk yang damai yang cenderung mengambil bentuk wanita bertubuh montok dan berisi. Hindari dia jika Anda memiliki sifat jahat, kecuali Anda ingin bertemu dengan akhir yang paling memalukan.
character.spider.description=Sedikit yang diketahui tentang wanita laba-laba dari reruntuhan, selain bahwa dia sangat berbahaya dan jahat. Ribuan anaknya adalah tentara mereka sendiri - masuk ke reruntuhan dengan risiko Anda sendiri.
character.wereslut.description=Tidak pasti apakah werewolf adalah serigala yang menjadi manusia, manusia yang menjadi serigala, atau hanya makhluk seperti beastman yang bisa terlihat seperti keduanya, tetapi kekuatan dan kelincahan seperti beastman dan cakar tajam membuat mereka sangat berbahaya.\n\nTampak seperti seorang pustakawan desa, werewolf ini memiliki kegemaran untuk kawin dengan anak laki-laki manusia, terutama yang kuat... dengan hasil yang bencana dan menganga.
character.wereslut_quickshot.description=Tidak pasti apakah werewolf adalah serigala yang menjadi manusia, manusia yang menjadi serigala, atau hanya makhluk seperti beastman yang bisa terlihat seperti keduanya, tetapi kekuatan dan kelincahan seperti beastman dan cakar tajam membuat mereka sangat berbahaya.\n\nMuda dan tidak berpengalaman, tetapi sangat kuat, werewolf ini hanya memiliki satu tujuan\: kawin. Dan dia tidak terlalu pilih-pilih tentang pasangannya.
character.lupa_werewolf.description=Tidak pasti apakah werewolf adalah serigala yang menjadi manusia, manusia yang menjadi serigala, atau hanya makhluk seperti beastman yang bisa terlihat seperti keduanya, tetapi kekuatan dan kelincahan seperti beastman dan cakar tajam membuat mereka sangat berbahaya.\n\nNamun, beberapa werewolf cukup jinak dan suka bermain. Selera seksual mereka mungkin terkadang menyebabkan keadaan yang tidak menguntungkan, tetapi mereka tidak bermaksud jahat.
character.angel.description=Makhluk ilahi yang melayani dewi purba yang terlupakan. Tidak pasti apa domain yang dimiliki atau dimiliki dewi-nya sebagai tugasnya, tetapi diketahui persis berapa panjang terompetnya.
character.naga.description=Naga adalah makhluk yang sangat ganas. Dia akan dengan mudah menghancurkan lawan seperti dia akan melahap atau mencemari mereka - tergantung pada suasana hatinya.\n\nBahkan naga sederhana adalah musuh yang sangat berbahaya - kuat, cerdik, senyap, gigih. Meremehkan sadisme mereka dengan risiko Anda sendiri.
character.quetzal_description=Naga adalah makhluk yang sangat ganas. Dia akan dengan mudah menghancurkan lawan seperti dia akan melahap atau mencemari mereka - tergantung pada suasana hatinya.\n\nSalah satu dewa kuno, konon, adalah naga antedeluvian, dari jenis "Quetzal" yang punah. Dia ditakuti jauh dan luas, meskipun jarang jika pernah turun dari puncak gunung Xiuh. Ada rumor bahwa dia membutuhkan pengorbanan perawan - selalu laki-laki, dengan preferensi untuk wajah lembut. Tidak diketahui apa yang terjadi pada mereka.
character.mermaid.description=Mermaid - cantik dan misterius, makhluk akuatik dengan tubuh manusia dan sirip ikan. Mereka dikenal karena memikat pelaut dengan penampilan dan lagu mereka yang memikat, tetapi tidak diketahui apa yang terjadi pada pelaut tersebut setelahnya.\n\nBetina diketahui bertelur - tetapi di mana mereka bertelur tidak diketahui.
character.warlock.description=Seorang warlock yang sangat kuat - sedikit lagi yang diketahui tentang dirinya, selain bahwa dia memiliki kebiasaan bermain-main dengan laki-laki.
character.giantess.description=Wanita yang sangat, sangat besar.
character.wasp.description=Orang-orang tawon dikenal karena perilaku predatoris individualistik dan siklus reproduksi mereka, yang mirip dengan sepupu mereka yang lebih kecil dan kurang cerdas. Menghindari sengatan mereka sangat dianjurkan, meskipun Anda selalu ingin tahu seperti apa rasanya chitin.
character.dullahan.description=Penunggang tanpa kepala... ditakuti karena kekuatan yang tidak manusiawi, dan penampilan yang mengerikan. Kabarnya, ketika kepala mereka terpisah dari tubuh, tubuh penuh nafsu mereka bertindak atas impuls tergelapnya... dan tidak memiliki preferensi untuk pria atau wanita. Bagi mereka yang tertangkap oleh penampakan tanpa kepala ini, mereka akan segera belajar bahwa dia memiliki kepala lain yang lebih menakutkan. Terutama ketika mereka menjadi akrab dengan mengerikan, dan dibuka dengan tidak nyaman, dengan itu.
character.alraune.description=Monster tanaman dengan penampilan yang menawan, mirip manusia, dikenal karena memikat para pelancong dengan aroma yang memikat, seperti tanaman karnivora tertentu, untuk alasan yang berkaitan dengan nutrisi dan reproduksi.
character.doppelganger.description=Makhluk yang meniru mangsanya. Tidak ada lagi yang diketahui.
character.persephone.description=Vampir wanita yang tegas dan sadis yang sering berada di bawah keinginan sirenya, Helena.
character.helena.description=Vampir wanita yang ceria dan maniak yang menumpahkan kasih sayang dan nafsu pada wardnya, Persephone.
character.minotauress.description=Seorang penjaga yang sangat kuat, sopan, sombong, dan bestial. Dapat membuat jalan berliku menjadi lurus, labirin atau lainnya.
character.fire_elemental.description=Roh api, yang hanya peduli dengan penyebaran apinya. Mengumpulkan kekuatan selama ribuan tahun, mereka memiliki kecerdasan seperti manusia, tetapi sedikit perhatian untuk kelemahan manusia. Sangat berbahaya.
character.ettin.description=Ogre adalah goblinoid yang besar dan kuat secara brutal - meskipun beberapa berpendapat bahwa mereka lebih dekat hubungannya dengan manusia. Kerajaan ogrish dulu umum, tetapi sekarang lebih umum untuk melihat ogre tunggal tidur di gua dan tanah terbuka, menjalani kehidupan sederhana tidur dan pembantaian.\n\nOgre berkepala dua, atau Ettin, dikenal untuk bertengkar di antara mereka sendiri, secara harfiah. Ini adalah anugerah bagi banyak petualang, karena mereka mungkin tidak dapat memutuskan nasib buruk apa yang harus menimpa mereka.
character.kitsune.description=Makhluk seperti rubah yang dikenal karena gaya flamboyan dan kepribadian yang ceria, seseorang dapat dimaklumi jika meremehkan kecerdikan dan kekejaman mereka. Ada rumor bahwa mereka memiliki sifat ganda, dan dapat bersikap dingin dan sadis terhadap musuh mereka. Tapi, sungguh, seberapa menakutkan wanita berpinggul lebar dan berpola fesyen yang berpayudara besar?
character.jester.description=Seorang badut misterius. Apa urusannya?
character.dark_knight.description=Knight gelap, pelayan yang ditakuti dari Raja Iblis. Berhati-hatilah.
character.dork_knight.description=Knight dork, pelayan (?) yang ditakuti dari Raja Iblis dan fujoshi. Berhati-hatilah dengan kapal-kapalnya.
character.cargirl.description=Seorang gadis kucing dengan kepribadian yang sangat genit dan ceria. Kabarnya, gigitannya lebih buruk dari meongannya, tetapi dia kebanyakan hanya menikmati memanjakan dirinya sendiri.
character.tentacle_witch.description=Seorang ahli seni gelap yang sangat khusus: yaitu tentakelmancy, atau divinasi menggunakan tentakel. Ternyata, ketika Anda berkonsultasi dengan tentakel untuk meramalkan masa depan, masa depan selalu "tentakel". Tidak menyukai hari Senin, dan suka bermain dengan anak laki-laki dengan cara yang tidak dapat dipahami.
character.demon_king.description="Raja Iblis". Memiliki kekuatan yang sangat besar, baik yang merusak maupun yang menggoda, mereka berada di kelas tersendiri. Berhati-hatilah para pahlawan. Tampaknya memiliki darah dari Succubi dan Dragons.
character.lemon_king.description="Raja Lemon". Memiliki kekuatan yang sangat besar, baik yang merusak maupun yang menggoda, mereka berada di kelas tersendiri (situs). Berhati-hatilah para pahlawan. Tampaknya memiliki darah dari Succubi, Dragons dan juga Lemons (?).
character.nurse.description=Seorang perawat yang bekerja di bank sperma provinsi, yang berfungsi sebagai tempat penyimpanan semen, serta dispensari untuk milkshake buatannya sendiri. Dia memiliki sikap ceria secara lahiriah, dan bersemangat untuk menjual barang dagangannya kepada para petualang. Peran gandanya sebagai perawat bank sperma dan pemilik tentu saja adalah kebetulan.\n\nTidak ada pengembalian uang.
character.merrybelle.description=Seorang succubus misterius.
character.wereslut.anatomy=Phallus mereka seperti anjing, dengan simpul bulat dan dapat mengembang di dekat pangkal yang memastikan inseminasi total dan hilangnya martabat total bagi penerima yang tidak beruntung dari perkawinannya. Peregangan yang dihasilkan kemungkinan, sebagian, permanen, jadi yang penasaran sebaiknya berhati-hati.
character.kitsune.anatomy=Phallus mereka seperti anjing, dengan simpul bulat dan dapat mengembang di dekat pangkal yang memastikan inseminasi total dan hilangnya martabat total bagi penerima yang tidak beruntung dari perkawinannya. Peregangan yang dihasilkan kemungkinan, sebagian, permanen, jadi yang penasaran sebaiknya berhati-hati. Ada juga duri kecil untuk memastikan bahwa betina mulai berovulasi. Kombinasi yang berbahaya, terutama karena sifatnya.
character.catgirl.anatomy=Phallusnya adalah karnivora, dengan duri kecil untuk memastikan bahwa betina mulai berovulasi. Ini membutuhkan beberapa penyesuaian, tetapi menimbulkan risiko minimal menyebabkan cedera kecuali superficial dan erangan besar dan memalukan seperti kucing yang sedang panas.
character.harpy.anatomy=Phallus mereka ternyata mamalia, bahkan seperti manusia, meskipun sangat panjang dan diselubungi oleh kulup yang tangguh. Mereka tidak terlalu higienis menurut standar humanoid, jadi seks oral sebaiknya diserahkan kepada yang berani
character.centaur.anatomy=Their phalluses are equine in nature and proud in stature. It is not recommended that humans mate with centaurs for this reason, as there are tangible dangers and it can't be good for morale. Picture a mare's winking hole to get a full picture of why this is a bad idea.
character.giantess.anatomy=A sect of the religion that worships Her specifically worships it, and with good reason.
character.ghost.anatomy=Their genitals are selectively intangible, and can interact with the living world. Sizable for a human in life, and nothing has changed there post-mortem. Can be tangible even when invisible, so sleeping with mouth closed is recommended.
character.goblin.anatomy=Siklus reproduksi goblinoid sulit dipelajari, dan dapat digambarkan sebagai "aneh." Hindari.
character.naga.anatomy=Phallus mereka bercabang banyak. Jangan terlibat.
character.ogre.anatomy=Lihat\: panjang dan lingkar rata-rata. Petualang diperingatkan untuk menjauhi ogre yang sedang birahi kecuali mereka ingin mendapatkan penis ogre sepanjang 60 cm di bokong mereka, dan ogre tidak pilih-pilih.
character.orc.anatomy=Phallus mereka sangat besar menurut standar manusia, dan ditutupi tonjolan kecil di dekat kepala yang dirancang untuk memaksa orc berovulasi, atau bagi manusia untuk mempertimbangkan kembali keputusan hidup mereka. Testis yang penuh dan berat bukan hiasan; ejakulasi dijamin akan menyebabkan kehamilan kecuali disuntikkan secara anal.
character.wasp.anatomy=Phallus mereka terbuat dari kitin, dan ovipositor mereka meletakkan telur. Jauhi.
character.fire_elemental.anatomy=Phallus mereka cukup standar untuk manusia, jika lebih panas dari suhu tubuh manusia, tetapi testis mereka, dan sampai batas tertentu penis mereka, menjadi sangat panas saat terisi dengan air mani dan mendekati ejakulasi, dan air mani super panas yang dihasilkan bisa menjadi kejutan yang tidak menyenangkan bagi pasangan yang tidak siap.
character.wereslut.fetishes=Mereka lebih suka memberi daripada menerima, menyukai pria yang kuat, dan mereka menikmati posisi doggy-style dan pasangan doggy-style.
