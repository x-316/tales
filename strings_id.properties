battle.drool.they_spew_massive_load_onto_ground=Mereka menyemburkan beban besar ke tanah\!
battle.drool.they_spit_all_of_the_cum_in_mouth_onto_ground=Mereka membuang semua sperma di mulut ke tanah\!
