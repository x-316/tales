tutorial.stances=Ketika kamu menggunakan sebuah keterampilan, kamu akan berakhir dalam posisi yang dihasilkan dari keterampilan tersebut, terlihat sebagai ikon di sebelah nama keterampilan. Ketika dalam posisi baru, kamu akan memiliki akses ke keterampilan baru. Kamu dapat menggunakan keterampilan yang akan mengembalikanmu ke posisi semula, atau bahkan posisi lain yang sebelumnya tidak tersedia.
tutorial.health_and_stamina_degradation=Ketika kesehatan atau stamina kamu berkurang, kamu akan mendapatkan penalti pada statistik kamu. Untuk melihat penalti ini, sorot potret karakter kamu. Ikon di sebelah bilah kesehatan dan stamina kamu juga akan menunjukkan bahwa ini telah terjadi. Pulihkan kesehatan atau stamina untuk menghilangkan penalti ini.
tutorial.grapples=Ketika kamu masuk ke dalam pergumulan dengan lawan, keterampilan yang tersedia dibatasi oleh stamina dan status pergumulan kamu saat ini, yang ditunjukkan di atas. Berjuang atau bergulat dengan musuh dapat meningkatkan status pergumulan kamu - tetapi mereka akan menggunakan keterampilan yang akan memiliki efek sebaliknya\!
tutorial.knockdown=Ketika kamu kehabisan stamina atau stabilitas, kamu akan jatuh ke tanah\! Saat mencoba untuk bangkit, kamu dapat berpindah melalui beberapa posisi, termasuk posisi Tangan dan Lutut dan posisi Berlutut, dan keterampilan yang tersedia dibatasi oleh stamina dan stabilitas kamu saat ini.
tutorial.disarm=Ketika kamu kehabisan pegangan senjata, senjata kamu akan terlepas\! Senjata yang terlepas sekarang ada dalam daftar barang kamu, dan dapat dipasang kembali dengan "menggunakan" nya.
