battle_screen.health_bar_tooltip=Ini mewakili kesehatan Anda. Kesehatan yang lebih tinggi meningkatkan statistik Anda, khususnya Kekuatan, Kelincahan, dan Ketahanan, sedangkan kesehatan yang rendah mengurangi mereka. Serangan dan efek status tertentu mengurangi kesehatan.
battle_screen.stamina_bar_tooltip=Ini mewakili stamina Anda. Stamina yang lebih tinggi meningkatkan statistik Anda, khususnya Kekuatan dan Kelincahan, sedangkan stamina yang rendah mengurangi mereka. Menggunakan keterampilan membutuhkan stamina, dan serangan dan efek status tertentu dari musuh juga mengurangi stamina. Pulihkan stamina dengan menggunakan keterampilan yang menenangkan.
battle_screen.balance_widget_tooltip=Ini mewakili keseimbangan Anda. Saat keseimbangan Anda menurun, Anda menjadi lebih rentan untuk jatuh. Menggunakan keterampilan yang tidak stabil mengurangi keseimbangan, begitu juga dengan menerima pukulan yang kuat. Pulihkan keseimbangan dengan menggunakan keterampilan yang stabil.
battle_screen.mana_bar_tooltip=Ini mewakili mana yang tersedia untuk Anda gunakan dalam penyihiran. Mantra akan gagal jika tidak ada cukup mana yang tersedia.
battle_screen.arousal_bar_breakdown=Tahap gairah saat ini\: {0}\nBerikutnya\: {1} 
battle_screen.arousal_bar_tooltip=Bar ini mewakili gairah. Saat terisi, tingkat gairah meningkat melalui beberapa tahap; setelah terisi penuh, ini akan mengakibatkan klimaks, yang akan menyebabkan orgasme dan ejakulasi pada karakter yang mampu.
