mutation.trudy_casts_titan_strength_on_you=Trudy memberikan Kekuatan Titan pada Anda\! "Lakukan yang lebih baik\!"
mutation.urka_offers_to_help=Urka menawarkan bantuan\! "Hmph. Mau aku urus ini?"
mutation.alma_offers_to_help=Alma menawarkan bantuan\! "Biar aku tangani ini."
battlescreen.results=Hasil\: 
battlescreen.stance_widget_tooltip=Ini adalah posisi Anda saat ini. Sebagian besar keterampilan akan mengubah posisi Anda, dan keterampilan tertentu yang digunakan oleh lawan Anda juga akan melakukannya. Posisi Anda menentukan keterampilan apa yang tersedia untuk Anda pada waktu tertentu, begitu juga dengan posisi lawan Anda, dan sebaliknya.

battlescreen.skill_text.next=Berikutnya\:
battlescreen.skill_text.tooltip=Ini adalah tampilan dari tindakan lawan Anda berikutnya. Semakin tinggi persepsi Anda, semakin sering ini terlihat, dan semakin banyak informasi yang ditampilkan, termasuk posisi dan keterampilan berikutnya mereka.
battlescreen.lust_widget_tooltip=Hasrat Saat Ini\: {0}%\n\nIni mewakili hasrat. Aktivitas seksual yang dilakukan oleh Anda dan lawan Anda meningkatkan hasrat, dan mencapai klimaks serta mengalihkan perhatian dapat menurunkannya. Hasrat yang lebih tinggi menyebabkan gairah meningkat lebih cepat dan mengurangi pengendalian diri Anda.
battlescreen.mana_widget_tooltip=Cadangan Mana Saat Ini\: {0}\n\nIni mewakili cadangan mana Anda. Beberapa keterampilan akan memungkinkan Anda untuk menarik mana dari cadangan ini ke dalam kolam mana aktif Anda. Jika tidak, ini akan digunakan untuk mengisi kembali kolam mana aktif Anda ketika Anda memiliki kesempatan untuk beristirahat.
battlescreen.missile_display_tooltip=Ini mewakili persediaan amunisi Anda untuk digunakan dengan busur. Ketika Anda tidak memiliki amunisi yang tersisa, Anda tidak dapat lagi menggunakan serangan busur Anda.
battlescreen.weapon_display_tooltip.start=Senjata digunakan untuk sebagian besar serangan, dan diperlukan untuk beberapa serangan, serta digunakan untuk bertahan. Ketika pegangan pada senjata mengendur, senjata menjadi kurang efektif, dan akhirnya akan terlepas.
battlescreen.weapon_display_tooltip.stats=Kerusakan yang diberikan saat ini\: {0}\nPegangan yang tersisa\: {1}
battlescreen.armor_tooltip.shield=Serangan yang dapat diblokir akan diblokir sebagian atau seluruhnya oleh perisai jika lawan menggunakan keterampilan lawan dengan komponen pemblokiran. Ini akan merusak perisai; ketika perisai rusak, itu akan menurunkan efektivitasnya dan akhirnya pecah.
battlescreen.armor_tooltip.armwear=Hanya serangan spesifik yang menargetkan pergelangan tangan yang menyerang di sini, tetapi pukulan ke pergelangan tangan akan mengendurkan pegangan pada senjata, akhirnya menyebabkan senjata terlepas.
battlescreen.armor_tooltip.underwear=Serangan dengan ketinggian rendah menyerang di sini. Beberapa keterampilan dapat digunakan untuk melepas pakaian dalam.
battlescreen.armor_tooltip.covers_bottom=Serangan dengan ketinggian rendah menyerang di sini.
battlescreen.armor_tooltip.covers_top=Serangan dengan ketinggian sedang dan tinggi menyerang ini, sehingga sangat penting untuk menjaga perlindungan di sini sekuat mungkin.
battlescreen.armor_tooltip.footwear=Hanya serangan spesifik yang menargetkan kaki yang menyerang di sini, tetapi pukulan ke kaki akan membuat tidak stabil dan akhirnya menyebabkan tersandung.
battlescreen.armor_tooltip.headgear=Hanya serangan spesifik yang menargetkan kepala yang menyerang di sini, tetapi pukulan ke kepala akan menyebabkan disorientasi, dan semakin besar kerusakan yang diterima oleh kepala, semakin besar disorientasi yang terjadi.
battlescreen.armor_tooltip.stats=Penyerapan kerusakan yang diberikan saat ini\: {0}\nKetahanan saat ini\: {1}
battlescreen.sperm_popup_x_ml={0} dz
battlescreen.grapple_display_tooltip=Ini menunjukkan status pergumulan Anda saat ini ({0}).\n\nStatus yang lebih ke kanan mewakili ketika Anda mengendalikan lawan Anda, dan status yang lebih ke kiri mewakili ketika mereka mengendalikan Anda.\n\nMemenangkan ronde pergumulan biasanya akan menggerakkan indikator pergumulan ke kanan, sementara kalah biasanya akan menggerakkan indikator pergumulan ke kiri.\n\nTeknik yang tersedia tergantung pada postur pergumulan Anda dan tingkat indikator pergumulan.
