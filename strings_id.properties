technique.power_attack.flavor_text=Pukulan kuat dan percaya diri ke bawah. Sangat efektif ketika digunakan pada musuh yang tumbang.
technique.tempo_attack.flavor_text=Serangan lanjutan yang digunakan untuk melanjutkan momentum serangan. Menjaga lawan dalam posisi bertahan.
technique.spring_attack.flavor_text=Serangan agresif tiba-tiba untuk memulai serangan. Berhati-hatilah dengan pijakan Anda.
technique.blitz_attack.flavor_text=Serangan lincah yang mengatur serangan yang sangat agresif. Pastikan Anda sangat yakin dengan pijakan Anda sebelum melakukannya.
technique.all_out_blitz.flavor_text=Melanjutkan serangan, menggunakan momentum dan pijakan yang baik untuk bergerak mulus dari satu pukulan ke pukulan berikutnya.
technique.change_up.flavor_text=Serangan tingkat lanjut yang mempertahankan postur ofensif, berpotensi membuat lawan bingung.
technique.hold_back.flavor_text=Mengakhiri serangan blitz, menempatkan pengguna dalam posisi kurang agresif, tetapi masih ofensif.
technique.reserved_attack.flavor_text=Mengakhiri serangan, kembali ke posisi seimbang yang dapat merespons musuh sesuai kebutuhan.
technique.advance.flavor_text=Serangan ofensif tiba-tiba dari posisi bertahan, dengan opsi lanjutan yang serbaguna.
technique.neutral_attack.flavor_text=Pukulan ke bawah yang normal, lemah dan jelas, tetapi tetap efektif.
technique.careful_attack.flavor_text=Pukulan yang tidak menurunkan pertahanan pengguna. Berguna untuk menjaga opsi pertahanan tetap terbuka.
technique.block.flavor_text=Manuver pertahanan seimbang yang memungkinkan pengguna untuk beralih ke posisi yang lebih defensif.
technique.guard.flavor_text=Manuver pertahanan terfokus, menggunakan semua alat yang tersedia untuk menolak serangan lawan.
technique.second_wind.flavor_text=Pengguna menurunkan tangan mereka dan merilekskan posisi mereka untuk mengambil napas, memulihkan stamina mereka.
technique.sudden_advance.flavor_text=Teknik yang tidak stabil - pengguna dengan cepat beralih dari posisi bertahan ke posisi ofensif sambil secara aktif menangkis lawan mereka.
technique.chant.flavor_text=Melindungi diri dengan perisai sambil mencoba mengeluarkan sedikit mana.
technique.riposte.flavor_text=Teknik pembalikan yang mampu menangkis serangan lawan sambil membalas dengan serangan Anda sendiri. Semakin dapat diprediksi musuh, semakin menghancurkan balasan tersebut.
technique.disarm.flavor_text=Teknik pembalikan yang dapat melucuti, menangkis, dan membalas lawan, terutama yang lebih lambat atau lebih dapat diprediksi, sambil menempatkan Anda dalam posisi untuk melakukan serangan ofensif.
technique.trip.flavor_text=Teknik yang mencoba menggunakan momentum lawan melawan mereka, membuat mereka tersandung.
technique.en_garde.flavor_text=Menangkis aktif yang digunakan untuk membelokkan serangan lawan.
technique.armor_sunder.flavor_text=Pukulan yang memaksimalkan kerusakan pada armor lawan.
technique.cautious_attack.flavor_text=Pukulan terampil yang melindungi pengguna saat dilakukan, dan meninggalkan mereka dalam posisi yang baik untuk bertahan melawan serangan balik.
technique.vault.flavor_text=Keterampilan yang meluncurkan pengguna ke udara dengan bentuk yang baik.
technique.jump_attack.flavor_text=Pukulan yang menghancurkan dari udara.
technique.vault_over.flavor_text=Dengan menggunakan momentum mereka, pengguna melompati serangan lawan.
technique.reckless_attack.flavor_text=Serangan yang tidak terduga dan kuat yang membuat pengguna tidak seimbang, tetapi tidak dapat diblokir.
technique.knock_down.flavor_text=Serangan yang menyeruduk yang bertujuan untuk menjatuhkan lawan dari kaki mereka.
technique.slide.flavor_text=Sapu kaki yang dapat menjatuhkan lawan sambil menghindari serangan mereka.
technique.taunt.flavor_text=Manuver menggoda pengantar, menggoda gerakan erotis yang akan datang.
technique.hit_the_deck.flavor_text=Penghindaran aktif yang melemparkan pengguna ke tanah.
technique.feint_and_strike.flavor_text=Tipuan dan serangan yang membuat pengguna tidak stabil kecuali mereka cukup terampil.
technique.parry.flavor_text=Menangkis aktif yang digunakan untuk membelokkan serangan lawan.
technique.uppercut.flavor_text=Pukulan yang datang dari bawah dan mendarat tinggi.
technique.slap_ass.flavor_text=Tamparan main-main pada bokong untuk menggoda seseorang untuk mencobanya.
technique.gesture.flavor_text=Gerakan tangan yang cabul dan sugestif.
technique.pucker_lips.flavor_text=Undangan menggunakan bibir.
technique.rub.flavor_text=Beberapa cinta diri yang dirancang untuk menggoda seseorang.
technique.blow_me.flavor_text=Membuat jelas bahwa Anda akan senang jika seseorang meletakkan bibir mereka di sekitar penis Anda.
technique.present.flavor_text=Teknik rayuan sederhana namun efektif: mengambil posisi.
technique.pound.flavor_text=Serangan pantat yang langsung.
technique.lube_cock.flavor_text=Melumasi penis Anda sendiri untuk bersenang-senang.
technique.lube_ass.flavor_text=Melumasi pantat Anda sendiri untuk bersenang-senang.
technique.drop_pants.flavor_text=Menurunkan celana atau pakaian dalam Anda ke lantai.
technique.lube_up.flavor_text=Melumasi lubang lawan Anda untuk bersenang-senang.
technique.spit_on_hole.flavor_text=Memberikan kilapan ludah pada bintang sheriff lawan Anda.
technique.slow_fuck.flavor_text=Berhubungan seks dengan lambat dan lembut.
technique.ass_blast.flavor_text=Teknik berhubungan seks dengan pantat yang frenetik, termasuk menarik rambut.
technique.crush_ass.flavor_text=Manuver mendalam yang menggali usus.
technique.prostate_grind.flavor_text=Keterampilan tingkat lanjut, dirancang untuk membuat penerima ejakulasi banyak.
technique.pound_prone_bone.flavor_text=Meremukkan pantat dengan posisi telentang di punggung penerima.
technique.irrumatio.flavor_text=Berhubungan seks dengan mulut secara langsung.
technique.force_deepthroat.flavor_text=Berhubungan seks dengan mulut dalam.
technique.grab_it.flavor_text=Digunakan untuk menangkap musuh dengan... yah, kamu tahu.
technique.step_on_it.flavor_text=Digunakan untuk menginjak musuh dengan... yah, kamu tahu.
technique.center.flavor_text=Fokus dan stabilkan diri Anda, bersiap untuk maju dan menyerang.
technique.inner_focus.flavor_text=Fokus dan stabilkan diri Anda, bersiap untuk momen yang tepat untuk menyerang.
technique.ashi.flavor_text=Berpose untuk menyerang, memanfaatkan predictability lawan Anda untuk keuntungan Anda.
technique.stonewall.flavor_text=Masuk ke posisi bertahan penuh, tidak dapat menyerang, tetapi sulit untuk dilukai.
technique.berserk.flavor_text=Masuk ke dalam amarah yang buta dan bergemuruh, kemarahan yang terkendali, pedang dengan dua mata.
technique.reel_back.flavor_text=Bersiap untuk melempar pukulan haymaker dengan momentum yang menakutkan.
technique.withdraw.flavor_text=Menempatkan jarak antara Anda dan lawan Anda.
technique.lock.flavor_text=Berusaha untuk langsung memenangkan pergumulan dengan mengalahkan lawan Anda.
technique.yoink.flavor_text=Mengeluarkan apa pun yang menghalangi lubang mereka dari jalan.
technique.yoink_oral.flavor_text=Mengeluarkan apa pun yang menghalangi mulut mereka dari jalan.
technique.combat_heal.flavor_text=Sihir penyembuhan diri yang mudah untuk dilemparkan ketika ritual yang lebih kompleks tidak akan tersedia dengan cukup cepat.
technique.true_heal.flavor_text=Sihir penyembuhan diri yang dilemparkan oleh penyihir sejati.
technique.ultra_heal.flavor_text=Ritual sihir penyembuhan diri dengan mantera yang mendalam yang dilemparkan oleh penyihir sejati.
technique.combat_fire.flavor_text=Sihir pemanggilan api yang mudah untuk dilemparkan dalam panasnya pertarungan jarak dekat.
technique.true_fire.flavor_text=Sihir pemanggilan api yang dilemparkan oleh penyihir sejati.
technique.ultra_fire.flavor_text=Ritual sihir pemanggilan api yang spektakuler dengan mantera yang mendalam yang dilemparkan oleh penyihir kuat.
technique.combat_frost.flavor_text=Sihir pemanggilan dingin yang mudah untuk dilemparkan dalam dekapan pertarungan jarak dekat.
technique.true_frost.flavor_text=Sihir pemanggilan dingin yang dilemparkan oleh penyihir sejati.
technique.ultra_frost.flavor_text=Ritual sihir pemanggilan dingin yang membekukan dengan mantera yang mendalam yang dilemparkan oleh penyihir kuat.
technique.combat_shock.flavor_text=Sihir pemanggilan listrik yang mudah untuk dilemparkan dengan cepat, meskipun celakalah penyihir yang terlalu dekat dengan target mereka\!
technique.true_shock.flavor_text=Sihir pemanggilan listrik yang dilemparkan oleh penyihir sejati.
technique.ultra_shock.flavor_text=Ritual sihir pemanggilan listrik yang mengagumkan dengan mantera yang mendalam yang dilemparkan oleh penyihir kuat.
technique.warmth.flavor_text=Sihir sederhana yang menghangatkan penyihir.
technique.cool.flavor_text=Sihir sederhana yang mendinginkan penyihir.
technique.titan_strength.flavor_text=Memanggil kekuatan seorang titan ke dalam tubuh pengguna.
technique.weakening_curse.flavor_text=Sihir yang mengutuk lawan, membuat mereka lemah.
technique.gravity.flavor_text=Sihir yang mengutuk lawan, membuat mereka jauh lebih berat.
technique.reforge.flavor_text=Memperbaiki armor secara magis, seolah-olah membalikkan waktu.
technique.oil.flavor_text=Melumuri target dengan minyak, membuat mereka licin dan mudah terbakar.
technique.inflict_wounds.flavor_text=Menimbulkan luka langsung pada target, menyebabkan kehilangan darah.
technique.paralyze.flavor_text=Kutukan yang kuat yang mengunci yang terkutuk di tempat selama durasinya.
technique.hypnosis.flavor_text=Menidurkan mereka yang terkutuk; lebih lemah dari kontrol pikiran penuh, tetapi masih sangat efektif.
technique.intoxicate.flavor_text=Mereka yang terkutuk menjadi mabuk seolah-olah oleh roh.
technique.invisibility.flavor_text=Suatu mantra yang membuat penyihirnya tidak terlihat oleh mereka yang tidak memiliki penglihatan sejati.
technique.sleep.flavor_text=Mereka yang terkutuk akan tertidur.
technique.phantasmal_shield.flavor_text=Memanggil perisai spektral yang dapat digunakan seperti perisai fisik.
technique.deflect.flavor_text=Suatu mantra yang memampukan senjata, memungkinkan senjata tersebut untuk secara instan memantulkan serangan lawan sepenuhnya jika memungkinkan untuk dilakukan.
technique.focus_energy.flavor_text=Suatu mantra untuk memusatkan semangat, memulihkan mana dari cadangan mana penyihir.
technique.deep_focus_energy.flavor_text=Suatu mantra untuk memusatkan semangat, memulihkan mana dari cadangan mana penyihir dan meningkatkan daya tahan mereka.
technique.quickcast.flavor_text=Suatu teknik untuk segera memasuki keadaan inkantasi yang dalam.
technique.fizzle.flavor_text=Suatu teknik yang digunakan oleh penyihir untuk mengakhiri inkantasi mereka, baik karena mereka telah berubah pikiran atau menyadari bahwa mereka tidak memiliki mana yang diperlukan untuk melakukan mantra pilihan mereka.
