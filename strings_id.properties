stat.strength.description=Kekuatan menentukan daya serangan mentah, yang mempengaruhi kerusakan, seberapa banyak serangan membuat musuh tidak seimbang, dan kontes kekuatan, seperti gulat, perjuangan, atau kunci senjata. PERINGATAN\: kekuatan tinggi menarik werewolf\!  
stat.endurance.description=Kesabaran menentukan stamina dan ketahanan, yang mempengaruhi kemampuanmu untuk terus menyerang tanpa merasa lelah, kemampuanmu untuk mengabaikan serangan dengan kerusakan rendah, dan mengenakan baju besi yang lebih berat tanpa menjadi kelelahan.  
stat.agility.description=Kelincahan menentukan keseimbangan dan keterampilan, mempengaruhi kemampuanmu untuk menjaga pijakan yang pasti bahkan saat melakukan manuver akrobatik, mendapatkan serangan yang tidak dapat diblokir terhadap musuh, dan menghindari serangan musuh.  
stat.perception.description=Pengamatan menentukan kemampuanmu untuk melihat serangan apa yang mungkin digunakan musuh selanjutnya dan bersiaplah sesuai dengan itu, serta kemampuan dasar pengintaianmu, yang menentukan informasi apa yang dapat kamu lihat tentang area yang akan datang.  
stat.magic.description=Kekuatan sihir menentukan kemampuan magismu, seperti seberapa kuat mantra sihir, dan berapa banyak yang dapat kamu ucapkan sebelum menjadi kelelahan secara magis.  
stat.charisma.description=Kepribadian menentukan kemampuanmu untuk mempengaruhi musuh, membuat mereka tenang dan mendengarkan alasan, membuat mereka marah, atau merayu mereka.  
