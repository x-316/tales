outcome.submission=Didominasi - musuh tidak lagi mau bertarung karena mereka telah menjadi penurut.
outcome.death=Kematian - Anda telah terbunuh, dan tidak dapat lagi bertarung karena Anda sudah mati.
outcome.pacifist=Pacifis - Anda telah menghindari konflik, karena lawan Anda tidak lagi ingin bertarung, tetapi ingin menyelesaikan masalah secara damai.
outcome.drunk=Mabuk - Anda mabuk, dan tidak dalam keadaan untuk bertarung.
outcome.drunk_other=Musuh Mabuk - Musuh Anda mabuk, dan tidak dalam keadaan untuk bertarung.
