credits.body=Skor asli oleh A Complete Spiral (www.acompletespiral.com)\nBanyak terima kasih kepada kontributor resmi Dern untuk pemrograman, debugging, dan dukungan\!\!\n\nPenggemar Succubus-Tier yang membantu mewujudkan ini\:\nDarksideX, JennaTran, Joel Fields, Laersect, dan terima kasih khusus kepada crufl dan Ace untuk dukungan moral, saran, dan persahabatan\! Kalian berdua sangat berarti\!\!\nJuga terima kasih khusus kepada NobleIntentions dan UpsideDownArbys yang mendengarkan kekesalan Maj\!\!\n\nPenyuntingan dan pengujian permainan oleh T3mp3st, Legion, Fattycakes, dan orang lain yang anonim\nJuga terima kasih kepada semua pendukung kami, yang membuat ini mungkin\!
outcome_text.knot_oral.wereslut=Itu tersangkut di belakang gigi Anda. Mulut Anda penuh\!
outcome_text.knot_oral=Anda telah disumpal di wajah\!
outcome_text.knot_anal.wereslut=Anda telah diikat\!\!\!\nAnda sekarang berada di bawah kendalinya.
outcome_text.knot_anal.spider=Anda telah diisi penuh dengan telur.
outcome_text.knot_anal.quetzal=Perut Anda menggembung dengan rasa sakit akibat sperma dewi\!
outcome_text.knot_anal=Anda telah disumpal di pantat\!
outcome_text.satisfied.mermaid=Anda akan meledakkan sperma ke dalam telur putri duyung\!
outcome_text.satisfied.centaur=Anda telah didominasi oleh kuda jantan centaur yang besar.
outcome_text.satisfied.ogre=Ogre telah memenuhi usus Anda dengan sperma ogre. Anda benar-benar sudah dikalahkan.
outcome_text.submission.mermaid=Anda tidak bisa melepaskan diri dari putri duyung\! Dia akan membuat Anda meledak\!
outcome_text.submission.angel=Dia duduk di wajah Anda dan tidak bisa dilepaskan - Anda tidak bisa lagi melawan\!
outcome_text.submission=Mereka benar-benar sudah kacau\! Mereka tidak lagi bermusuhan.
outcome_text.death.naga=Anda sedang dihancurkan\!
outcome_text.pacifist.angel=Dia memperhatikan kurangnya agresi Anda, dan berdiri turun.
outcome_text.pacifist=Anda telah menenangkan musuh\!
outcome_text.surrender=Anda berlutut dalam penyerahan, dan mereka menghentikan permusuhan.
outcome_text.rescue_urka=Anda berlutut dalam penyerahan, dan Urka turun tangan untuk campur tangan.
outcome_text.rescue_alma=Anda berlutut dalam penyerahan, dan Alma turun tangan untuk campur tangan.
outcome_text.drunk=Anda terlalu mabuk untuk melanjutkan\!
outcome_text.drunk_other=Mereka terlalu mabuk untuk melanjutkan\!
